<!DOCTYPE html>
<html>
<head>
    <title>Cookie Flow Test</title>
</head>
<body>
    <h1>🔍 Cookie Debugging</h1>
    <button id="testCookies">Test Cookie Detection</button>
    <div id="results"></div>

    <script>
        document.getElementById('testCookies').addEventListener('click', async () => {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing...</p>';

            // 1. Check browser cookies
            console.log('🍪 All browser cookies:', document.cookie);

            // 2. Test debug endpoint with fetch
            try {
                const response = await fetch('/api/debug-cookies', {
                    method: 'GET',
                    credentials: 'include' // CRITICAL for cookies!
                });

                const data = await response.json();
                console.log('🔍 Server saw cookies:', data);

                results.innerHTML = `
                    <h3>Browser Cookies:</h3>
                    <pre>${document.cookie || 'No cookies found'}</pre>

                    <h3>Server Received:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('🚨 Error:', error);
                results.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
